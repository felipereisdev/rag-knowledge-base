name: CI

on:
  push:
    branches: [main, 'feat/*']
  pull_request:
    branches: [main]

env:
  COMPOSE_FILE: docker-compose.yml

jobs:
  test:
    name: Tests (Pest + integration)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Copy CI env
        run: cp .env.ci .env

      - name: Generate APP_KEY
        run: echo "APP_KEY=base64:$(openssl rand -base64 32)" >> .env

      - name: Build and start services
        run: docker compose --profile dev up -d --build app-dev postgres embedder

      - name: Wait for postgres
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U rag -d rag; then
              echo "postgres is ready"
              break
            fi
            echo "waiting for postgres... ($i/30)"
            sleep 2
          done

      - name: Wait for embedder
        run: |
          # The embedder image is python:3.11-slim (no curl). Probe /health
          # via python urllib, matching the service's own healthcheck.
          for i in $(seq 1 60); do
            if docker compose exec -T embedder python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=3).status==200 else 1)"; then
              echo "embedder is ready"
              break
            fi
            echo "waiting for embedder... ($i/60)"
            sleep 5
          done

      - name: Generate key in container
        run: docker compose --profile dev exec -T app-dev php artisan key:generate

      - name: Run migrations
        run: docker compose --profile dev exec -T app-dev php artisan migrate --force

      - name: Run Pest
        run: docker compose --profile dev exec -T app-dev vendor/bin/pest

      - name: Tear down
        if: always
        run: docker compose down -v

  lint:
    name: Lint (PHPStan + Pint)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Copy CI env
        run: cp .env.ci .env

      - name: Generate APP_KEY
        run: echo "APP_KEY=base64:$(openssl rand -base64 32)" >> .env

      - name: Build app-dev
        run: docker compose --profile dev up -d --build app-dev

      - name: Run PHPStan
        run: docker compose --profile dev exec -T app-dev vendor/bin/phpstan analyse --memory-limit=2G

      - name: Run Pint (check only)
        run: docker compose --profile dev exec -T app-dev vendor/bin/pint --test

      - name: Tear down
        if: always
        run: docker compose down -v

  build-and-push:
    name: Build and push to ghcr.io
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.app
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rag-app:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/rag-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max