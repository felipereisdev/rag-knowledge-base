<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Base - Approval</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #222633;
    --border: #2d3142;
    --text: #e4e6eb;
    --text-dim: #8b8fa3;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --green: #22c55e;
    --green-hover: #16a34a;
    --red: #ef4444;
    --red-hover: #dc2626;
    --yellow: #eab308;
    --purple: #a855f7;
    --cyan: #06b6d4;
    --orange: #f97316;
    --pink: #ec4899;
    --teal: #14b8a6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 24px;
  }
  h1 { font-size: 1.5rem; margin-bottom: 8px; }
  .subtitle { color: var(--text-dim); margin-bottom: 24px; }
  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .project-header { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .project-header h2 { font-size: 1.1rem; margin-bottom: 4px; }
  .path { color: var(--text-dim); font-size: 0.85rem; font-family: monospace; }
  .stats { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .badge {
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--border);
  }
  .badge.indexed { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge.pending { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .badge.rejected { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge.total { background: var(--border); color: var(--text-dim); }
  .desc { color: var(--text-dim); font-size: 0.85rem; padding: 8px 20px; }
  .actions { padding: 12px 20px; display: flex; gap: 8px; }
  .btn {
    padding: 6px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
  }
  .btn.approve { background: var(--green); color: #fff; }
  .btn.approve:hover { background: var(--green-hover); }
  .btn.reject { background: var(--red); color: #fff; }
  .btn.reject:hover { background: var(--red-hover); }
  .pending-list { padding: 0 20px 16px; }
  .entry-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 8px;
  }
  .entry-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    gap: 8px;
    flex-wrap: wrap;
  }
  .entry-title { font-weight: 600; font-size: 0.95rem; }
  .entry-meta { display: flex; gap: 6px; align-items: center; }
  .cat-tag {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
  }
  .cat-business-rule { background: rgba(59,130,246,0.15); color: var(--accent); }
  .cat-design-decision { background: rgba(168,85,247,0.15); color: var(--purple); }
  .cat-architecture { background: rgba(6,182,212,0.15); color: var(--cyan); }
  .cat-documentation { background: rgba(20,184,166,0.15); color: var(--teal); }
  .cat-insight { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .cat-convention { background: rgba(249,115,22,0.15); color: var(--orange); }
  .cat-constraint { background: rgba(236,72,153,0.15); color: var(--pink); }
  .source-tag {
    font-size: 0.7rem;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--border);
    color: var(--text-dim);
  }
  .tag-list { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
  .tag-badge {
    font-size: 0.7rem;
    padding: 1px 6px;
    border-radius: 3px;
    background: rgba(59,130,246,0.1);
    color: var(--accent);
  }
  .entry-preview pre {
    font-size: 0.8rem;
    color: var(--text-dim);
    white-space: pre-wrap;
    word-wrap: break-word;
    max-height: 200px;
    overflow-y: auto;
    margin-bottom: 8px;
  }
  .entry-actions { display: flex; gap: 6px; }
  .btn-sm {
    padding: 4px 12px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 500;
  }
  .btn-sm.approve { background: var(--green); color: #fff; }
  .btn-sm.approve:hover { background: var(--green-hover); }
  .btn-sm.reject { background: var(--red); color: #fff; }
  .btn-sm.reject:hover { background: var(--red-hover); }
  .empty { color: var(--text-dim); padding: 16px 20px; font-style: italic; }
  code { background: var(--border); padding: 1px 4px; border-radius: 3px; font-size: 0.85rem; }
</style>
</head>
<body>
  <h1>Knowledge Base</h1>
  <p class="subtitle">Review and approve pending knowledge entries.</p>
  {{PROJECTS}}
  <script>
    async function approveEntry(id) {
      await fetch('/api/approve', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({entry_ids: [id]})
      });
      location.reload();
    }
    async function rejectEntry(id) {
      await fetch('/api/reject', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({entry_ids: [id]})
      });
      location.reload();
    }
    async function approveAll(projectId) {
      await fetch('/api/approve-project', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({project_id: projectId})
      });
      location.reload();
    }
    async function rejectAll(projectId) {
      await fetch('/api/reject-project', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({project_id: projectId})
      });
      location.reload();
    }
  </script>
</body>
</html>
