services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    environment:
      - POSTGRES_DB=rag
      - POSTGRES_USER=rag
      - POSTGRES_PASSWORD=secret
    volumes:
      - rag-pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  embedder:
    build:
      context: services/embedder
      dockerfile: Dockerfile
    container_name: rag-embedder
    ports:
      - "8001:8000"
    environment:
      - RAG_EMBEDDING_MODEL=paraphrase-multilingual-mpnet-base-v2
      - RAG_EMBEDDING_DIM=768
    volumes:
      - hf-cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
      target: production
    container_name: rag-app
    volumes:
      - storage:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost:8090
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=rag
      - DB_USERNAME=rag
      - DB_PASSWORD=secret
      - RAG_EMBED_URL=http://embedder:8000/v1
      - RAG_EMBED_KEY=rag-local
      - RAG_EMBEDDING_MODEL=paraphrase-multilingual-mpnet-base-v2
      - RAG_EMBEDDING_DIM=768
      - QUEUE_CONNECTION=database
      - SESSION_DRIVER=database
      - CACHE_STORE=database
    depends_on:
      postgres:
        condition: service_healthy
      embedder:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r \"new PDO('pgsql:host=postgres;dbname=rag','rag','secret');\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.app
      target: production
    container_name: rag-web
    entrypoint: ["nginx", "-g", "daemon off;"]
    volumes:
      - ./docker/nginx/app.conf:/etc/nginx/http.d/default.conf:ro
      - storage:/var/www/html/storage:ro
    ports:
      - "8090:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/up || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.app
      target: production
    container_name: rag-worker
    entrypoint: ["/usr/local/bin/entrypoint-worker.sh"]
    volumes:
      - storage:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=rag
      - DB_USERNAME=rag
      - DB_PASSWORD=secret
      - RAG_EMBED_URL=http://embedder:8000/v1
      - RAG_EMBED_KEY=rag-local
      - RAG_EMBEDDING_MODEL=paraphrase-multilingual-mpnet-base-v2
      - RAG_EMBEDDING_DIM=768
      - QUEUE_CONNECTION=database
    depends_on:
      postgres:
        condition: service_healthy
      embedder:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php artisan queue:work --once --no-interaction || exit 1"]
      interval: 30s
      timeout: 60s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.app
      target: app-dev
    container_name: rag-app-dev
    profiles: ["dev"]
    volumes:
      - ./:/var/www/html
      - storage:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
    environment:
      - APP_ENV=testing
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=rag
      - DB_USERNAME=rag
      - DB_PASSWORD=secret
      - RAG_EMBED_URL=http://embedder:8000/v1
      - RAG_EMBED_KEY=rag-local
      - RAG_EMBEDDING_MODEL=paraphrase-multilingual-mpnet-base-v2
      - RAG_EMBEDDING_DIM=768
      - QUEUE_CONNECTION=database
      - SESSION_DRIVER=database
      - CACHE_STORE=database
    depends_on:
      postgres:
        condition: service_healthy
      embedder:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command: ["sleep infinity"]

volumes:
  rag-pgdata:
  storage:
  bootstrap-cache:
  hf-cache: