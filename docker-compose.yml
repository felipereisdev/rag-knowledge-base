services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    environment:
      - POSTGRES_DB=rag
      - POSTGRES_USER=rag
      - POSTGRES_PASSWORD=secret
    volumes:
      - rag-pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
      target: production
    container_name: rag-app
    volumes:
      - storage:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
    env_file:
      - path: .env
        required: false
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost:8090
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=rag
      - DB_USERNAME=rag
      - DB_PASSWORD=secret
      - RAG_EMBEDDING_PROVIDER=${RAG_EMBEDDING_PROVIDER:-local-embedder}
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-paraphrase-multilingual-mpnet-base-v2}
      - RAG_EMBEDDING_DIM=${RAG_EMBEDDING_DIM:-768}
      - QUEUE_CONNECTION=database
      - SESSION_DRIVER=database
      - CACHE_STORE=database
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r \"new PDO('pgsql:host=postgres;dbname=rag','rag','secret');\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.app
      target: production
    container_name: rag-web
    entrypoint: ["nginx", "-g", "daemon off;"]
    volumes:
      - ./docker/nginx/app.conf:/etc/nginx/http.d/default.conf:ro
      - storage:/var/www/html/storage:ro
    ports:
      - "8090:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/up || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  indexer:
    build:
      context: .
      dockerfile: Dockerfile.app
      target: production
    container_name: rag-indexer
    entrypoint: ["/usr/local/bin/entrypoint-worker.sh"]
    volumes:
      - storage:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
    env_file:
      - path: .env
        required: false
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=rag
      - DB_USERNAME=rag
      - DB_PASSWORD=secret
      - RAG_EMBEDDING_PROVIDER=${RAG_EMBEDDING_PROVIDER:-local-embedder}
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-paraphrase-multilingual-mpnet-base-v2}
      - RAG_EMBEDDING_DIM=${RAG_EMBEDDING_DIM:-768}
      - QUEUE_CONNECTION=database
      - QUEUE_NAME=indexing
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.app
      target: production
    container_name: rag-worker
    profiles: ["condense"]
    entrypoint: ["/usr/local/bin/entrypoint-worker.sh"]
    volumes:
      - storage:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
    env_file:
      - path: .env
        required: false
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=rag
      - DB_USERNAME=rag
      - DB_PASSWORD=secret
      - RAG_EMBEDDING_PROVIDER=${RAG_EMBEDDING_PROVIDER:-local-embedder}
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-paraphrase-multilingual-mpnet-base-v2}
      - RAG_EMBEDDING_DIM=${RAG_EMBEDDING_DIM:-768}
      - QUEUE_CONNECTION=database
      - QUEUE_NAME=condense
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.app
      target: app-dev
    container_name: rag-app-dev
    profiles: ["dev"]
    volumes:
      - ./:/var/www/html
      - storage:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
    env_file:
      - path: .env
        required: false
    environment:
      - APP_ENV=testing
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=rag
      - DB_USERNAME=rag
      - DB_PASSWORD=secret
      - RAG_EMBEDDING_PROVIDER=${RAG_EMBEDDING_PROVIDER:-local-embedder}
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-paraphrase-multilingual-mpnet-base-v2}
      - RAG_EMBEDDING_DIM=${RAG_EMBEDDING_DIM:-768}
      - QUEUE_CONNECTION=database
      - SESSION_DRIVER=database
      - CACHE_STORE=database
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command: ["sleep infinity"]

volumes:
  rag-pgdata:
  storage:
  bootstrap-cache:
